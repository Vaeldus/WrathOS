---
dontChroot: false
script:
  - command: "sh -c 'mkdir -p /boot/efi/EFI/BOOT'"
    timeout: 10
  - command: "sh -c 'grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=WrathOS --force'"
    timeout: 120
  - command: "sh -c 'update-grub'"
    timeout: 60
  - command: "sh -c 'cp /boot/efi/EFI/WrathOS/grubx64.efi /boot/efi/EFI/BOOT/BOOTX64.EFI 2>/dev/null || true'"
    timeout: 10
  - command: "sh -c 'grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=WrathOS --force --recheck'"
    timeout: 120
  - command: "sh -c 'update-grub'"
    timeout: 60
  - command: "sh -c 'rm -f /usr/share/applications/calamares.desktop /home/*/Desktop/calamares.desktop 2>/dev/null || true'"
    timeout: 10
  - command: "sh -c 'flatpak remote-add --if-not-exists --system flathub https://flathub.org/repo/flathub.flatpakrepo 2>/dev/null || true'"
    timeout: 30
